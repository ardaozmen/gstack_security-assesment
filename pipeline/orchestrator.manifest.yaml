version: "1.0"
name: "secops-orchestrator"
entrypoint: "/sec-autoplan"
state_files:
  - "AUTO_PLAN_STATUS.md"
  - "PIPELINE_CONTEXT.md"

modes:
  full:
    steps: [1, 2, 3, 4, 5, 6, 7]
  fast:
    steps: [1, 3, 6]
  compliance:
    steps: [1, 4, 5, 6, 7]
  resume:
    strategy: "last_failed_step"

step_catalog:
  1:
    id: "sec-scope"
    command: "/sec-scope"
    spec: "../skills/specs/sec-scope.spec.md"
    outputs: ["SCOPE.md"]
    gate: "Gate-SCOPE"
    depends_on: []
  2:
    id: "sec-threat-model"
    command: "/sec-threat-model"
    spec: "../skills/specs/sec-threat-model.spec.md"
    outputs: ["THREAT_MODEL.md"]
    gate: "Gate-THREAT"
    depends_on: [1]
  3:
    id: "sec-owasp"
    command: "/sec-owasp"
    spec: "../skills/specs/sec-owasp.spec.md"
    outputs: ["OWASP_FINDINGS.md"]
    gate: "Gate-OWASP"
    depends_on: [1, 2]
    parallel_group: "assessment"
  4:
    id: "sec-regulatory"
    command: "/sec-regulatory"
    spec: "../skills/specs/sec-regulatory.spec.md"
    outputs: ["REGULATORY_FINDINGS.md"]
    gate: "Gate-REG"
    depends_on: [1]
    parallel_group: "assessment"
  5:
    id: "sec-igrc"
    command: "/sec-igrc"
    spec: "../skills/specs/sec-igrc.spec.md"
    outputs: ["IGRC_FINDINGS.md", "RACI_MATRIX.md"]
    gate: "Gate-IGRC"
    depends_on: [1, 4]
    parallel_group: "assessment"
  6:
    id: "sec-risk-report"
    command: "/sec-risk-report"
    spec: "../skills/specs/sec-risk-report.spec.md"
    outputs: ["RISK_REPORT.md", "RISK_REGISTER.csv"]
    gate: "Gate-RISK"
    depends_on: [1]
  7:
    id: "sec-signoff"
    command: "/sec-signoff"
    spec: "../skills/specs/sec-signoff.spec.md"
    outputs: ["SIGNOFF_PACKAGE.md"]
    gate: "Gate-SIGNOFF"
    depends_on: [6]

global_policies:
  enforce_order: true
  block_on_gate_fail: true
  block_on_unresolved_taste_decision: true
  human_final_decision_required: true

