version: "1.0"
name: "security-assessment"
entrypoint: "/security-assessment"
state_files:
  - "AUTO_PLAN_STATUS.md"
  - "PIPELINE_CONTEXT.md"

modes:
  full:
    steps: [1, 2, 3, 4, 5, 6, 7]
  fast:
    steps: [1, 3, 6]
  compliance:
    steps: [1, 4, 5, 6, 7]
  resume:
    strategy: "last_failed_step"

step_catalog:
  1:
    id: "sec-scope"
    command: "/sec-scope"
    spec: "../skills/sec-scope/SKILL.md"
    outputs: ["SCOPE.md"]
    gate: "Gate-SCOPE"
    depends_on: []
  2:
    id: "sec-threat-model"
    command: "/sec-threat-model"
    spec: "../skills/sec-threat-model/SKILL.md"
    outputs: ["THREAT_MODEL.md", "threat-modeling.html"]
    gate: "Gate-THREAT"
    depends_on: [1]
  3:
    id: "sec-owasp"
    command: "/sec-owasp"
    spec: "../skills/sec-owasp/SKILL.md"
    outputs: ["OWASP_FINDINGS.md"]
    gate: "Gate-OWASP"
    depends_on: [1, 2]
    parallel_group: "assessment"
  4:
    id: "sec-regulatory"
    command: "/sec-regulatory"
    spec: "../skills/sec-regulatory/SKILL.md"
    outputs: ["REGULATORY_FINDINGS.md"]
    gate: "Gate-REG"
    depends_on: [1]
    parallel_group: "assessment"
  5:
    id: "sec-igrc"
    command: "/sec-igrc"
    spec: "../skills/sec-igrc/SKILL.md"
    outputs: ["IGRC_FINDINGS.md", "RACI_MATRIX.md"]
    gate: "Gate-IGRC"
    depends_on: [1, 4]
    parallel_group: "assessment"
  6:
    id: "sec-project-requirements"
    command: "/sec-project-requirements"
    spec: "../skills/sec-project-requirements/SKILL.md"
    outputs: ["PROJECT_REQUIREMENTS.md", "project-requirements.html"]
    gate: "Gate-REQ"
    depends_on: [2, 3, 4, 5]  # full-mode deps; orchestrator resolves against active steps
  7:
    id: "sec-signoff"
    command: "/sec-signoff"
    spec: "../skills/sec-signoff/SKILL.md"
    outputs: ["SIGNOFF_PACKAGE.md"]
    gate: "Gate-SIGNOFF"
    depends_on: [6]

global_policies:
  enforce_order: true
  block_on_gate_fail: true
  block_on_unresolved_taste_decision: true
  human_final_decision_required: true
